name: PrimuseTVPreview
options:
  bundleIdPrefix: com.welape
  deploymentTarget:
    tvOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: "7.0.0"
targets:
  PrimuseKit:
    type: framework
    platform: tvOS
    sources:
      - path: PrimuseKit/Sources/PrimuseKit
    dependencies:
      - package: GRDB
      - sdk: AppIntents.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.welape.yuanyin.kit.tv
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        TVOS_DEPLOYMENT_TARGET: "17.0"
  PrimuseTVPreview:
    type: application
    platform: tvOS
    sources:
      - path: PrimuseTV
        excludes:
          - "Info.plist"
      # 复用 iOS app 的「干净」曲库数据核心(直接编进 tvOS app target)
      - path: Primuse/Services/Library/MusicLibrary.swift
      - path: Primuse/Services/Library/LibraryDatabase.swift
      - path: Primuse/Services/Library/PlayHistoryStore.swift
      - path: Primuse/Services/Sources/SourcesStore.swift
      - path: Primuse/Services/Metadata/MetadataAssetStore.swift
      - path: Primuse/Services/Metadata/FileMetadataReader.swift
      - path: Primuse/Services/Cloud/LibrarySnapshotSync.swift
      - path: Primuse/Utilities/FileLogger.swift
      - path: Primuse/Utilities/Extensions/TimeInterval+Format.swift
    dependencies:
      - target: PrimuseKit
      - target: PrimuseTopShelf
      - package: GRDB
    info:
      path: PrimuseTV/Info-preview.plist
      properties:
        CFBundleDisplayName: Primuse
        CFBundleName: Primuse
        # 与正式 tvOS target 一致:允许局域网明文 HTTP(iPhone 中继 / http NAS 直链)。
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
        # 与正式 target 一致:注册 primuse:// 以便 Top Shelf 点击深链回到 app
        CFBundleURLTypes:
          - CFBundleURLName: "com.welape.yuanyin.tvpreview"
            CFBundleURLSchemes:
              - primuse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.welape.yuanyin.tvpreview
        TARGETED_DEVICE_FAMILY: "3"
        TVOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_ENTITLEMENTS: Config/PrimuseTV.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  # 顶部内容展示扩展(与正式工程一致),让模拟器也能验证 Top Shelf
  PrimuseTopShelf:
    type: app-extension
    platform: tvOS
    sources:
      - path: PrimuseTopShelf
    dependencies:
      - target: PrimuseKit
      - package: GRDB
      - sdk: TVServices.framework
    info:
      path: PrimuseTopShelf/Info.plist
      properties:
        CFBundleDisplayName: "Primuse Top Shelf"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.tv-top-shelf
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).TopShelfProvider
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.welape.yuanyin.tvpreview.topshelf
        SKIP_INSTALL: YES
        TVOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_ENTITLEMENTS: Config/PrimuseTopShelf.entitlements

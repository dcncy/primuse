name: PrimuseTVPreview
options:
  bundleIdPrefix: com.welape
  deploymentTarget:
    tvOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: "7.0.0"
targets:
  PrimuseKit:
    type: framework
    platform: tvOS
    sources:
      - path: PrimuseKit/Sources/PrimuseKit
    dependencies:
      - package: GRDB
      - sdk: AppIntents.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.welape.yuanyin.kit.tv
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        TVOS_DEPLOYMENT_TARGET: "17.0"
  PrimuseTVPreview:
    type: application
    platform: tvOS
    sources:
      - path: PrimuseTV
        excludes:
          - "Info.plist"
      # 复用 iOS app 的「干净」曲库数据核心(直接编进 tvOS app target)
      - path: Primuse/Services/Library/MusicLibrary.swift
      - path: Primuse/Services/Library/LibraryDatabase.swift
      - path: Primuse/Services/Library/PlayHistoryStore.swift
      - path: Primuse/Services/Sources/SourcesStore.swift
      - path: Primuse/Services/Metadata/MetadataAssetStore.swift
      - path: Primuse/Services/Metadata/FileMetadataReader.swift
      - path: Primuse/Services/Cloud/LibrarySnapshotSync.swift
      - path: Primuse/Utilities/FileLogger.swift
      - path: Primuse/Utilities/Extensions/TimeInterval+Format.swift
    dependencies:
      - target: PrimuseKit
      - package: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.welape.yuanyin.tvpreview
        TARGETED_DEVICE_FAMILY: "3"
        TVOS_DEPLOYMENT_TARGET: "17.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Primuse
        CODE_SIGN_ENTITLEMENTS: Config/PrimuseTV.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
